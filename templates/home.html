<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nesika Portfolio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  html {
  scroll-behavior: smooth;
}
body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #0f0f0f;
    color: white;
}

/* NAVBAR */
.navbar {
    padding: 15px 30px;
}

.navbar-brand {
    font-weight: bold;
    font-size: 22px;
    letter-spacing: 1px;
}

/* HERO SECTION */
.home {
    text-align: center;
    margin: 120px auto;
    max-width: 800px;
}

.title {
    font-size: 50px;
    font-weight: 700;
}

.title span {
    color: #0d6efd;
}

.subtitle {
    font-size: 24px;
    color: #aaa;
    margin-top: 10px;
}

.desc {
    font-size: 18px;
    margin-top: 20px;
    line-height: 1.6;
    color: #ccc;
}

/* BUTTONS */
.buttons {
    margin-top: 30px;
}

.btn-custom {
    padding: 10px 20px;
    border-radius: 6px;
    font-weight: 500;
}

.btn-primary {
    background-color: #0d6efd;
    border: none;
}

.btn-outline-light {
    border: 1px solid white;
}

.btn:hover {
    opacity: 0.8;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">

    <a class="navbar-brand" href="#">NESIKA</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-3">
        <li class="nav-item"><a class="btn btn-outline-light" href="/">Home</a></li>
        <li class="nav-item"><a class="btn btn-outline-light" href="/about">About me</a></li>
      </ul>
    </div>

  </div>
</nav>

<!-- HERO SECTION -->
<div class="home">

  <h1 class="title">Hi, I'm <span>Nesika</span></h1>

  <h2 class="subtitle">Full Stack Developer</h2>

  <p class="desc">
    I build complete applications from frontend to backend, focusing on clean design,
    efficient logic, and real-world problem solving.
  </p>

  <div class="buttons">
    <a href="/projects" class="btn btn-primary btn-custom">View Projects</a>
    <a href="/contact" class="btn btn-outline-light btn-custom">Contact Me</a>
  </div>

</div>

</body>
</html>
